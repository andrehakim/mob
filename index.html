<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>페이지 이동 중</title>
<script>
var siteList = [
    'https://bjdbai.depixelsm.com/p/xgKSb', // <-- 쉼표 추가!
    'https://bjdbai.depixelsm.com/p/zGNDA', // <-- 쉼표 추가!
    'https://bjdbai.hubbusty.com/s/5de5f8eacbde1?subsource=DIABLO&ext_click_id=DIABLO&sub1=DIABLO'  // <-- 마지막은 쉼표 없음
  ];
  try {
    if (siteList && siteList.length > 0) {
      // 0부터 (목록 개수 - 1) 사이의 무작위 숫자 뽑기
      var randomIndex = Math.floor(Math.random() * siteList.length);
      
      // 무작위로 뽑힌 주소 가져오기
      var randomSite = siteList[randomIndex];
      
      // 해당 주소로 즉시 이동시키기
      window.location.href = randomSite;
    } else {
      // 목록이 비어있는 경우 화면에 오류 메시지 표시
      document.addEventListener('DOMContentLoaded', function() {
        document.body.innerHTML = '오류: 사이트 목록이 비어있습니다. 코드를 확인해주세요.';
      });
    }
  } catch (e) {
    // 기타 오류 발생 시 화면에 오류 메시지 표시
    document.addEventListener('DOMContentLoaded', function() {
      document.body.innerHTML = '페이지 이동 중 오류가 발생했습니다.';
    });
  }
</script>
</head>
<body>
  <p>Loading page. Please wait a moment...</p>
</body>
</html>
